<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교환일기</title>
  <style>
    :root {
      --bg: #fff7fb;
      --card: #ffffff;
      --text: #3b2f35;
      --muted: #8b7d84;
      --pink: #ff8ab3;
      --pink-dark: #e85f91;
      --line: #ffd3e3;
      --shadow: 0 16px 40px rgba(232, 95, 145, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffe3ef 0, var(--bg) 42%, #fff 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 34px 18px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.5px;
    }

    header p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .wrap {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(8px);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      margin: 14px 0 7px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.7;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255, 138, 179, 0.18);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      font-size: 15px;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .primary {
      background: var(--pink);
      color: white;
      width: 100%;
      margin-top: 16px;
    }

    .ghost {
      background: #fff0f6;
      color: var(--pink-dark);
      border: 1px solid var(--line);
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row > * { flex: 1; }

    .status {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .letters {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .letter-item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 15px;
      cursor: pointer;
    }

    .letter-item strong {
      display: block;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .letter-meta {
      color: var(--muted);
      font-size: 12px;
    }

    dialog {
      border: 1px solid var(--line);
      border-radius: 24px;
      width: min(560px, calc(100% - 26px));
      padding: 0;
      box-shadow: var(--shadow);
    }

    dialog::backdrop { background: rgba(59, 47, 53, 0.28); }

    .modal {
      padding: 24px;
      background: #fff;
      border-radius: 24px;
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .modal .body {
      white-space: pre-wrap;
      line-height: 1.8;
      margin-top: 18px;
      background: #fff7fb;
      border: 1px solid var(--line);
      padding: 16px;
      border-radius: 18px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 34px 12px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fffafd;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .password-box {
      width: min(420px, calc(100% - 28px));
      margin: 80px auto;
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      .wrap { grid-template-columns: 1fr; }
      header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <section id="login" class="card password-box">
    <h2>🔐 교환일기</h2>
    <p style="color: var(--muted); line-height: 1.6;">비밀번호를 입력하면 편지를 쓰고 읽을 수 있어요.</p>
    <label for="password">비밀번호</label>
    <input id="password" type="password" placeholder="둘만 아는 비밀번호" />
    <button class="primary" onclick="login()">열기</button>
    <div id="loginStatus" class="status"></div>
  </section>

  <main id="app" class="hidden">
    <header>
      <h1>💌 교환일기</h1>
     
    </header>

    <section class="wrap">
      <div class="card">
        <h2>✍️ 편지 쓰기</h2>

        <div class="row">
          <div>
            <label for="writer">작성자</label>
            <select id="writer">
              <option value="예은">예은</option>
              <option value="준희">준희</option>
            </select>
          </div>
          <div>
            <label for="mood">오늘 기분</label>
            <input id="mood" placeholder="예: 보고싶음" />
          </div>
        </div>

        <label for="title">제목</label>
        <input id="title" placeholder="오늘 편지 제목" />

        <label for="content">내용</label>
        <textarea id="content" placeholder="여기에 편지를 써주새용"></textarea>

        <button id="saveBtn" class="primary" onclick="saveLetter()">저장하기</button>
        <div id="saveStatus" class="status"></div>
      </div>

      <div class="card">
        <div class="top-actions">
          <h2 style="margin:0;">☷ 편지 목록</h2>
          <button class="ghost" onclick="loadLetters()">새로고침</button>
        </div>
        <div id="letters" class="letters">
          <div class="empty">아직 편지가 없어요.</div>
        </div>
      </div>
    </section>
  </main>

  <dialog id="letterDialog">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalMeta" class="letter-meta"></div>
      <div id="modalBody" class="body"></div>
      <button class="primary" onclick="document.getElementById('letterDialog').close()">닫기</button>
    </div>
  </dialog>

  <script>
    // 1) 아래 주소를 Apps Script 배포 URL로 바꿔주세요.
    const API_URL = "https://script.google.com/macros/s/AKfycbyyJ4dJU_f7FDFq7J2eb1HZiWPbL_TWn6mS_LWG9bf4Gk4m8j2Wn1-x65yGB-_TJny21w/exec";

    // 2) 둘만 아는 비밀번호로 바꿔주세요.
    const PASSWORD = "0418";

    const $ = (id) => document.getElementById(id);

    function login() {
      if ($("password").value === PASSWORD) {
        $("login").classList.add("hidden");
        $("app").classList.remove("hidden");
        loadLetters();
      } else {
        $("loginStatus").textContent = "비밀번호가 달라요 ㅠㅠ";
      }
    }

    $("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });

    async function saveLetter() {
      const writer = $("writer").value.trim();
      const mood = $("mood").value.trim();
      const title = $("title").value.trim();
      const content = $("content").value.trim();

      if (!title || !content) {
        $("saveStatus").textContent = "제목이랑 내용을 둘 다 적어주용";
        return;
      }

      if (!API_URL.includes("script.google.com")) {
        $("saveStatus").textContent = "먼저 API_URL에 Apps Script 주소를 넣어야 해요.";
        return;
      }

      $("saveBtn").disabled = true;
      $("saveStatus").textContent = "저장 중...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ writer, mood, title, content })
        });

        const data = await res.json();
        if (!data.ok) throw new Error(data.message || "저장 실패");

        $("title").value = "";
        $("content").value = "";
        $("mood").value = "";
        $("saveStatus").textContent = "저장 완료 💗";
        await loadLetters();
      } catch (err) {
        $("saveStatus").textContent = "저장에 실패했어요. Apps Script 설정을 확인해줘.";
      } finally {
        $("saveBtn").disabled = false;
      }
    }

    async function loadLetters() {
      const box = $("letters");

      if (!API_URL.includes("script.google.com")) {
        box.innerHTML = `<div class="empty">API_URL을 넣으면 편지 목록이 보여요.</div>`;
        return;
      }

      box.innerHTML = `<div class="empty">불러오는 중...</div>`;

      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        const letters = data.letters || [];

        if (letters.length === 0) {
          box.innerHTML = `<div class="empty">아직 편지가 없어요.</div>`;
          return;
        }

        box.innerHTML = "";
        letters.reverse().forEach((letter) => {
          const item = document.createElement("div");
          item.className = "letter-item";
          item.innerHTML = `
            <strong>✉️ ${escapeHtml(letter.title)}</strong>
            <div class="letter-meta">${escapeHtml(letter.writer)} · ${formatDate(letter.date)} ${letter.mood ? "· " + escapeHtml(letter.mood) : ""}</div>
          `;
          item.onclick = () => openLetter(letter);
          box.appendChild(item);
        });
      } catch (err) {
        box.innerHTML = `<div class="empty">편지를 불러오지 못했어요.</div>`;
      }
    }

    function openLetter(letter) {
      $("modalTitle").textContent = `✉️ ${letter.title}`;
      $("modalMeta").textContent = `${letter.writer} · ${formatDate(letter.date)}${letter.mood ? " · " + letter.mood : ""}`;
      $("modalBody").textContent = letter.content;
      $("letterDialog").showModal();
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
