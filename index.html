<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교환일기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="login" class="login-card">
    <div class="mini-star">★</div>
    <h1>교환일기</h1>
    <input id="password" type="password" placeholder="비밀번호" autocomplete="off" />
    <button class="primary" onclick="login()">열기</button>
    <div id="loginStatus" class="status"></div>
  </section>

  <main id="app" class="page hidden">
    <header class="hero">
      <div class="mini-star">★</div>
      <h1>교환일기</h1>
    </header>

    <section class="grid">
      <article class="panel write-panel">
        <div class="panel-head">
          <h2>편지 쓰기</h2>
          <span>✦</span>
        </div>

        <div class="two-col">
          <div>
            <label for="writer">작성자</label>
            <select id="writer">
              <option value="예은">예은</option>
              <option value="준희">준희</option>
            </select>
          </div>
          <div>
            <label for="mood">오늘 기분</label>
            <input id="mood" placeholder="예: 보고싶음?ㅎㅎ" />
          </div>
        </div>

        <label for="title">제목</label>
        <input id="title" placeholder="제목을 입력해주세요" />

        <label for="content">내용</label>
        <textarea id="content" placeholder="오늘의 이야기를 적어보세요"></textarea>

        <button id="saveBtn" class="primary" onclick="saveLetter()">편지 보내기</button>
        <div id="saveStatus" class="status"></div>
      </article>

      <article class="panel list-panel">
        <div class="panel-head">
          <h2>편지 목록</h2>
          <button class="icon-btn" onclick="loadLetters()" title="새로고침">↻</button>
        </div>

        <div id="letters" class="letters">
          <div class="empty">아직 편지가 없눈데...</div>
        </div>
        <div id="count" class="count"></div>
      </article>
    </section>

    <footer>© 2026 교환일기 예은이가 만듦</footer>
  </main>

  <dialog id="letterDialog">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalMeta" class="letter-meta"></div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-actions">
        <button class="secondary" onclick="document.getElementById('letterDialog').close()">닫기</button>
        <button id="modalDeleteBtn" class="danger">삭제하기</button>
      </div>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
